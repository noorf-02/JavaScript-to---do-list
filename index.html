<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>To Do List</title>
</head>

<body class="bg-gray-100 focus:outline-none">
    <div class="mx-auto w-[90%] text-center mt-10 text-4xl font-bold">
        <h1>TO DO LIST</h1>
    </div>

    <div
        class="add-container mx-auto w-[90%] bg-gray-200 w-[380px] p-3 flex justify-center items-center mt-5 shadow-2xl rounded-2xl">
        <div class="flex flex-col items-baseline gap-5 p-5">
            <p class="font-bold text-2xl">Enter Task</p>
            <input
                class="write-task border-1 w-[320px] border-white bg-white rounded-full px-4 py-3 shadow-2xl focus:outline-none"
                type="text">
            <button
                class="submit-task hover:bg-green-700 cursor-pointer submit bg-green-600 text-white py-1 px-3 font-bold rounded-full" onclick="getInput()">Submit</button>
        </div>
    </div>

    <div class="show-tasks overflow-wrap mx-auto w-[90%] mt-15 flex bg-gray-200 rounded-2xl shadow-2xl p-5 w-[800px] ">
        <div class="task-append flex flex-col items-baseline gap-3">
            <p class="font-bold text-2xl">Your Tasks</p>
            <!-- <div class="task-container flex flex-col items-center justify-center gap-3 invisible"> -->
                <!-- <p class="task-field bg-white rounded-full py-4 px-4 focus:outline-none w-fit break-all content overflow-wrap" type="text"></p> -->
                <!-- <i
                    class="task-done fa-solid fa-check bg-green-600 text-white rounded-full text-[16px] p-2 hover:bg-green-700 cursor-pointer" onclick="removeTask()"></i>
            </div> -->
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
